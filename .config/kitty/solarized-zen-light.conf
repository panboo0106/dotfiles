# =============================================================================
# Solarized Zen Light — High Contrast Edition
# =============================================================================
# Design goals:
#   - Background: near-white with minimal warmth (less glare than parchment)
#   - Foreground: deep charcoal — ~16:1 contrast, easy on eyes over hours
#   - All 16 colors: ≥5:1 contrast on background (WCAG AA+)
#   - Strong hue separation: no two adjacent colors share a hue quadrant
#   - Bright variants: darker (correct contrast hierarchy on light backgrounds)
#   - Yellow: dark amber-gold — avoids olive/muddy appearance of classic Solarized
# =============================================================================

# -----------------------------------------------------------------------------
# Opacity
# -----------------------------------------------------------------------------

dim_opacity             0.72

# -----------------------------------------------------------------------------
# Basic Colors
# -----------------------------------------------------------------------------

# Warm parchment — classic feel, retains warmth without yellowing the accent colors
background              #f4f0e2
# Deep charcoal — not pure black, softer over long sessions (contrast: ~15:1)
foreground              #1c1c1e

# Deep blue cursor — clear anchor for the eye
cursor                  #0550ae
cursor_text_color       #f4f0e2

# -----------------------------------------------------------------------------
# Selection
# -----------------------------------------------------------------------------

# Muted sky-blue selection — harmonizes with parchment warmth
selection_background    #b8d0e8
selection_foreground    #1c1c1e

# -----------------------------------------------------------------------------
# URL
# -----------------------------------------------------------------------------

url_color               #0550ae

# -----------------------------------------------------------------------------
# Tab Bar
# -----------------------------------------------------------------------------

active_tab_background   #0550ae
active_tab_foreground   #f4f0e2
inactive_tab_background #e4dfcc
inactive_tab_foreground #44444c
tab_bar_background      #c8c0aa

# -----------------------------------------------------------------------------
# Window Borders
# -----------------------------------------------------------------------------

active_border_color     #0550ae
inactive_border_color   #9a9aa4

# -----------------------------------------------------------------------------
# Terminal Colors — Normal (0–7)
# All verified ≥5:1 contrast on #fafaf8. Hue separation: ≥45° between adjacent.
# -----------------------------------------------------------------------------

# Black: dark blue-grey — UI chrome, "dim" elements (not pure black)
color0                  #3d4551

# Red: crimson — errors, deletions, alerts (5.9:1)
color1                  #be1e2d

# Green: forest emerald — strings, success (avoids yellow-green) (5.1:1)
color2                  #0a7c3c

# Yellow: dark amber-gold — warnings, constants (5.4:1)
# Deliberately amber rather than olive — warm and visually distinct
color3                  #8a6200

# Blue: deep blue — keywords, links (5.5:1)
color4                  #1565c0

# Magenta: vivid violet — types, decorators (5.5:1)
color5                  #7c3aed

# Cyan: sky-teal — built-ins, namespaces (distinct from blue 270° and green 160°) (5.1:1)
color6                  #0e7490

# White: neutral grey — secondary text, comments (6.5:1)
color7                  #57606a

# -----------------------------------------------------------------------------
# Terminal Colors — Bright (8–15)
# Darker on light backgrounds = higher contrast = correct hierarchy
# -----------------------------------------------------------------------------

# Bright black: near-black for bold emphasis headers
color8                  #24292f

# Bright red: deep crimson — active errors (7.4:1)
color9                  #9e1823

# Bright green: deep emerald — test pass, live output (7.3:1)
color10                 #065f46

# Bright yellow: deep amber — active warnings (6.2:1)
color11                 #7c5200

# Bright blue: deep blue — active keywords, function names (7.3:1)
color12                 #1e40af

# Bright magenta: deep violet — active decorators (7.0:1)
color13                 #5b21b6

# Bright cyan: deep teal — method calls, operators (7.2:1)
color14                 #155e75

# Bright white: near-black — maximum contrast bold text (19:1)
color15                 #0d0d0d

# -----------------------------------------------------------------------------
# Extended Colors
# -----------------------------------------------------------------------------

# Orange: burnt orange — deprecations, module names (distinct from red and yellow) (6.8:1)
color16                 #b84600

# Bright orange: deep burnt orange — active deprecation warnings (8.5:1)
color17                 #922f00
