# =============================================================================
# Solarized Zen Light
# =============================================================================
# A clean, eye-friendly light theme for long coding sessions.
# Inspired by Solarized Light but with improved perceptual color separation,
# a cooler background to reduce eye strain, and proper bright/dim hierarchy.
#
# Design goals:
#   - Background: warm parchment (less yellow than classic Solarized)
#   - Foreground: deep navy ink (not black, not dark teal)
#   - 8 accent hues with clear 45°+ separation on the color wheel
#   - Brights are DEEPER (darker value, same hue) for correct contrast on light bg
#   - Green is forest green, not muddy yellow-green
#   - Orange extended color distinct from red & yellow
# =============================================================================

# -----------------------------------------------------------------------------
# Opacity
# -----------------------------------------------------------------------------

dim_opacity             0.72

# -----------------------------------------------------------------------------
# Basic Colors
# -----------------------------------------------------------------------------

# Warm parchment — less aggressive yellow than #fdf6e3, easier on the eyes
background              #f4f0e2
# Deep navy ink — consistent with Solarized spirit but more neutral
foreground              #1c2d38

# Blue cursor — draws eye without adding visual noise
cursor                  #1a6faf
cursor_text_color       #f4f0e2

# -----------------------------------------------------------------------------
# Selection
# -----------------------------------------------------------------------------

# Soft sky-blue selection — clear without harshness
selection_background    #b8d4ea
selection_foreground    #1c2d38

# -----------------------------------------------------------------------------
# URL
# -----------------------------------------------------------------------------

url_color               #1a6faf

# -----------------------------------------------------------------------------
# Tab Bar
# -----------------------------------------------------------------------------

active_tab_background   #1a6faf
active_tab_foreground   #f4f0e2
inactive_tab_background #e8e2cf
inactive_tab_foreground #3d5468
tab_bar_background      #c8bfa8

# -----------------------------------------------------------------------------
# Window Borders
# -----------------------------------------------------------------------------

active_border_color     #1a6faf
inactive_border_color   #8fa4ae

# -----------------------------------------------------------------------------
# Terminal Colors — Normal (0-7)
# Tuned for good contrast and hue separation on light backgrounds.
# -----------------------------------------------------------------------------

# Black: dark blue-grey (avoids pure black, fits light theme)
color0                  #3d5260

# Red: clear crimson — errors, git deletions, warnings
color1                  #bf3535

# Green: forest green — strings, success (NOT yellow-green)
color2                  #3a7800

# Yellow: deep olive-amber — warnings, constants (53°/5.19:1)
color3                  #6a5e00

# Blue: clear medium blue — keywords, links
color4                  #1a6faf

# Magenta: purple-violet — types, special keywords (distinct hue from red)
color5                  #883c8c

# Cyan: deep teal — built-ins, namespaces
color6                  #107870

# White: steel blue-grey — secondary UI, dim text (4.7:1)
color7                  #4a6878

# -----------------------------------------------------------------------------
# Terminal Colors — Bright (8-15)
# Brights are more saturated variants — correct hierarchy for light background.
# -----------------------------------------------------------------------------

# Bright black: for emphasis text / bold headers
color8                  #293e4c

# Bright red: deep crimson — inline errors, active alerts (4.10:1→5.19:1)
color9                  #c02828

# Bright green: emerald (152° hue, distinct from color2 91°) — live output, test pass (3.43:1→4.92:1)
color10                 #007840

# Bright yellow: vivid olive-amber — active warnings (53°/hue-matched to color3)
color11                 #6e6200

# Bright blue: deep royal blue — function names, interactive elements (3.70:1→5.80:1)
color12                 #1060a0

# Bright magenta: vivid violet — decorators, attributes
color13                 #9640a0

# Bright cyan: deep teal — method calls, operators (3.13:1→6.19:1)
color14                 #0c6460

# Bright white: near-black — maximum contrast text (bold, cursor adjacent)
color15                 #001a28

# -----------------------------------------------------------------------------
# Extended Colors
# -----------------------------------------------------------------------------

# Orange: warm orange — distinct from red and yellow (deprecations, module names) (4.35:1→5.05:1)
color16                 #b04400

# Bright orange: deep burnt orange — active deprecation warnings (3.35:1→5.61:1)
color17                 #903800
