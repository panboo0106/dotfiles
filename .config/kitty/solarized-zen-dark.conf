# =============================================================================
# Solarized Zen Dark
# =============================================================================
# Color values are mirrored in: nvim/lua/config/palette.lua (M.dark)
# To change a color: update palette.lua first, then sync here.
# Each color value is preceded by a comment line: "# palette: <key>"
# =============================================================================

# -----------------------------------------------------------------------------
# Basic Colors
# -----------------------------------------------------------------------------

# dim text: keep close to kitty default (0.4) — dark theme looks better with subtle dim
dim_opacity             0.65

# palette: bg
background              #00242c
# palette: fg
foreground              #839395

# palette: cyan — distinct accent color, avoids blending with fg text
cursor                  #29a298
# palette: bg
cursor_text_color       #00242c

# -----------------------------------------------------------------------------
# Selection
# -----------------------------------------------------------------------------

# palette: selection
selection_background    #268bd3
selection_foreground    #ffffff

# -----------------------------------------------------------------------------
# URL
# -----------------------------------------------------------------------------

# palette: url
url_color               #29a298

# -----------------------------------------------------------------------------
# Tab Bar
# -----------------------------------------------------------------------------

# palette: cyan
active_tab_background   #29a298
active_tab_foreground   #ffffff
# palette: bg2 (lightened from #002c38 to separate from tab_bar_background)
inactive_tab_background #0a3848
# palette: fg2
inactive_tab_foreground #7a9aa5
# palette: bg1
tab_bar_background      #002830

# -----------------------------------------------------------------------------
# Window/Pane Borders
# -----------------------------------------------------------------------------

# palette: selection
active_border_color     #268bd3
# palette: bg2 (lightened from #002c38: was 1.01:1 vs bg, now visible at 2.5:1)
inactive_border_color   #1e4e62

