# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# е…ЁеұҖе‘Ҫд»Өи¶…ж—¶пјҢйҳІжӯўж…ўе‘Ҫд»Өйҳ»еЎһ promptпјҲеҚ•дҪҚ msпјҢй»ҳи®Ө 500пјү
command_timeout = 2000

# Replace the 'вқҜ' symbol in the prompt with 'вһң'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[вһң](bold green)' # The 'success_symbol' segment is being set to 'вһң' with the color 'bold green'

