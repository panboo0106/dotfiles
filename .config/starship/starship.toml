# в”Җв”Җ еӨ§д»“еә“жҖ§иғҪдјҳеҢ– в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[git_status]
# еӨ§д»“еә“дјҳеҢ–пјҡ300ms и¶…ж—¶пјҢи¶…ж—¶еҗҺи·іиҝҮжҳҫзӨәдёҚйҳ»еЎһ prompt
scan_timeout = 300
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
untracked = "?${count}"
stashed = "${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "В»${count}"
deleted = "вңҳ${count}"
# жһҒеӨ§д»“еә“еҸҜзӣҙжҺҘзҰҒз”Ёпјҡ
# disabled = true

[git_metrics]
# жү§иЎҢ git diff --statпјҢеӨ§д»“еә“йқһеёёж…ўпјҢжҳҫејҸе…ій—ӯпјҲй»ҳи®Өе·ІзҰҒз”Ёпјү
disabled = true

[git_commit]
